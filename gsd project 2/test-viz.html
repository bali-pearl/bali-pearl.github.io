<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viz Debugger</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        #status {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .section {
            margin: 10px 0;
            padding: 10px;
            background: #333;
            border-radius: 4px;
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .warning { color: #fbbf24; }
        pre {
            background: #111;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        button {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #7c3aed;
        }
        #iframe-container {
            margin-top: 20px;
            border: 2px solid #444;
            border-radius: 8px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
        }
    </style>
</head>
<body>
    <h1>Visualization Debugger</h1>
    
    <div id="status">
        <h2>Status Checks</h2>
        <div id="checks"></div>
    </div>

    <div>
        <button onclick="runChecks()">Run All Checks</button>
        <button onclick="openInNewWindow()">Open Viz in New Window</button>
        <button onclick="toggleIframe()">Toggle Embedded View</button>
    </div>

    <div id="iframe-container" style="display: none;">
        <iframe id="viz-iframe" src="http://localhost:8080/viz/"></iframe>
    </div>

    <script>
        const checksDiv = document.getElementById('checks');
        let iframeVisible = false;

        async function runChecks() {
            checksDiv.innerHTML = '<p>Running checks...</p>';
            const results = [];

            // Check 1: Server responding
            try {
                const res = await fetch('http://localhost:8080/viz/');
                if (res.ok) {
                    results.push({ name: 'Server Status', status: 'success', msg: 'Server responding on port 8080' });
                } else {
                    results.push({ name: 'Server Status', status: 'error', msg: `Server returned ${res.status}` });
                }
            } catch (e) {
                results.push({ name: 'Server Status', status: 'error', msg: e.message });
            }

            // Check 2: index.html exists
            try {
                const res = await fetch('http://localhost:8080/viz/index.html');
                if (res.ok) {
                    results.push({ name: 'index.html', status: 'success', msg: 'File exists and accessible' });
                } else {
                    results.push({ name: 'index.html', status: 'error', msg: 'File not found' });
                }
            } catch (e) {
                results.push({ name: 'index.html', status: 'error', msg: e.message });
            }

            // Check 3: CSV data
            try {
                const res = await fetch('http://localhost:8080/viz/harvard_cross_registration_data.csv');
                if (res.ok) {
                    const text = await res.text();
                    const lines = text.split('\n').length;
                    results.push({ name: 'CSV Data', status: 'success', msg: `Found CSV with ${lines} lines` });
                } else {
                    results.push({ name: 'CSV Data', status: 'warning', msg: 'CSV not found at viz/ path' });
                }
            } catch (e) {
                results.push({ name: 'CSV Data', status: 'warning', msg: e.message });
            }

            // Check 4: Vendor libraries
            const vendors = ['three.min.js', 'papaparse.min.js', '3d-force-graph.min.js'];
            for (const lib of vendors) {
                try {
                    const res = await fetch(`http://localhost:8080/viz/vendor/${lib}`);
                    if (res.ok) {
                        results.push({ name: `Vendor: ${lib}`, status: 'success', msg: 'Library loaded' });
                    } else {
                        results.push({ name: `Vendor: ${lib}`, status: 'error', msg: 'Library missing' });
                    }
                } catch (e) {
                    results.push({ name: `Vendor: ${lib}`, status: 'error', msg: e.message });
                }
            }

            // Check 5: Main JavaScript modules
            const modules = ['main.js', 'data.js', 'viz.js'];
            for (const mod of modules) {
                try {
                    const res = await fetch(`http://localhost:8080/viz/${mod}`);
                    if (res.ok) {
                        results.push({ name: `Module: ${mod}`, status: 'success', msg: 'Module accessible' });
                    } else {
                        results.push({ name: `Module: ${mod}`, status: 'error', msg: 'Module missing' });
                    }
                } catch (e) {
                    results.push({ name: `Module: ${mod}`, status: 'error', msg: e.message });
                }
            }

            // Check 6: Test console errors from iframe
            results.push({ 
                name: 'Console Errors', 
                status: 'warning', 
                msg: 'To check console errors, open browser DevTools (F12) on the main viz page' 
            });

            displayResults(results);
        }

        function displayResults(results) {
            let html = '';
            for (const r of results) {
                html += `
                    <div class="section">
                        <strong class="${r.status}">${r.name}:</strong>
                        <span class="${r.status}">${r.msg}</span>
                    </div>
                `;
            }
            checksDiv.innerHTML = html;
        }

        function openInNewWindow() {
            window.open('http://localhost:8080/viz/', '_blank');
        }

        function toggleIframe() {
            const container = document.getElementById('iframe-container');
            iframeVisible = !iframeVisible;
            container.style.display = iframeVisible ? 'block' : 'none';
            
            if (iframeVisible) {
                // Listen for console messages from iframe (limited by CORS)
                window.addEventListener('message', (e) => {
                    console.log('Message from iframe:', e.data);
                });
            }
        }

        // Auto-run checks on load
        window.onload = () => {
            runChecks();
        };
    </script>
</body>
</html>
