<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            line-height: 1.5;
        }
        .header {
            background: #252526;
            padding: 15px;
            border-radius: 8px 8px 0 0;
            border-bottom: 2px solid #007acc;
        }
        .header h1 {
            font-size: 18px;
            color: #007acc;
        }
        .header p {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .console {
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            border-radius: 0 0 8px 8px;
            padding: 15px;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            font-size: 13px;
        }
        .log-entry {
            padding: 4px 8px;
            margin: 2px 0;
            border-left: 3px solid transparent;
            display: flex;
            align-items: flex-start;
        }
        .log-entry .timestamp {
            color: #858585;
            margin-right: 10px;
            min-width: 80px;
        }
        .log-entry.info { border-left-color: #4fc3f7; color: #4fc3f7; }
        .log-entry.warn { border-left-color: #ffa726; color: #ffa726; }
        .log-entry.error { border-left-color: #ef5350; color: #ef5350; }
        .log-entry.success { border-left-color: #66bb6a; color: #66bb6a; }
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        button:hover {
            background: #005a9e;
        }
        button.secondary {
            background: #3c3c3c;
        }
        button.secondary:hover {
            background: #505050;
        }
        .status {
            background: #252526;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #3c3c3c;
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .status-value {
            font-weight: bold;
        }
        .status-value.ok { color: #66bb6a; }
        .status-value.error { color: #ef5350; }
        .iframe-container {
            margin-top: 20px;
            border: 2px solid #3c3c3c;
            border-radius: 8px;
            overflow: hidden;
            display: none;
        }
        .iframe-container.visible {
            display: block;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
            background: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 Visualization Console Monitor</h1>
        <p>Monitoring: http://localhost:8080/viz/</p>
    </div>

    <div class="console" id="console">
        <div class="log-entry info">
            <span class="timestamp">00:00:00</span>
            <span>Console monitor initialized. Waiting for viz page to load...</span>
        </div>
    </div>

    <div class="controls">
        <button onclick="loadVizInIframe()">Load Viz in Iframe</button>
        <button onclick="openVizInNewTab()">Open Viz in New Tab</button>
        <button class="secondary" onclick="clearConsole()">Clear Console</button>
        <button class="secondary" onclick="copyToClipboard()">Copy Console Output</button>
    </div>

    <div class="status">
        <div class="status-item">
            <span>Server Status:</span>
            <span class="status-value" id="serverStatus">Checking...</span>
        </div>
        <div class="status-item">
            <span>Files Loaded:</span>
            <span class="status-value" id="filesLoaded">0/8</span>
        </div>
        <div class="status-item">
            <span>JavaScript Errors:</span>
            <span class="status-value" id="jsErrors">0</span>
        </div>
        <div class="status-item">
            <span>WebGL Support:</span>
            <span class="status-value" id="webglSupport">Checking...</span>
        </div>
    </div>

    <div class="iframe-container" id="iframeContainer">
        <iframe id="vizFrame" src="about:blank"></iframe>
    </div>

    <script>
        const consoleDiv = document.getElementById('console');
        let logCount = 0;
        let errorCount = 0;

        function getTimestamp() {
            const now = new Date();
            return now.toTimeString().split(' ')[0];
        }

        function addLog(type, message) {
            logCount++;
            if (type === 'error') errorCount++;
            
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `
                <span class="timestamp">${getTimestamp()}</span>
                <span>${message}</span>
            `;
            consoleDiv.appendChild(entry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            
            document.getElementById('jsErrors').textContent = errorCount;
            document.getElementById('jsErrors').className = 'status-value ' + (errorCount > 0 ? 'error' : 'ok');
        }

        function clearConsole() {
            consoleDiv.innerHTML = '<div class="log-entry info"><span class="timestamp">' + 
                getTimestamp() + '</span><span>Console cleared</span></div>';
            logCount = 0;
            errorCount = 0;
            document.getElementById('jsErrors').textContent = '0';
            document.getElementById('jsErrors').className = 'status-value ok';
        }

        function copyToClipboard() {
            const text = Array.from(consoleDiv.querySelectorAll('.log-entry'))
                .map(entry => entry.textContent.trim())
                .join('\n');
            navigator.clipboard.writeText(text).then(() => {
                addLog('success', 'Console output copied to clipboard');
            }).catch(err => {
                addLog('error', 'Failed to copy: ' + err.message);
            });
        }

        function openVizInNewTab() {
            window.open('http://localhost:8080/viz/', '_blank');
            addLog('info', 'Opened visualization in new tab. Check that tab for any errors.');
        }

        function loadVizInIframe() {
            const container = document.getElementById('iframeContainer');
            const iframe = document.getElementById('vizFrame');
            
            if (container.classList.contains('visible')) {
                container.classList.remove('visible');
                iframe.src = 'about:blank';
                addLog('info', 'Iframe hidden');
            } else {
                container.classList.add('visible');
                iframe.src = 'http://localhost:8080/viz/';
                addLog('info', 'Loading visualization in iframe...');
                
                iframe.onload = () => {
                    addLog('success', 'Iframe loaded successfully');
                };
                
                iframe.onerror = () => {
                    addLog('error', 'Failed to load iframe');
                };
            }
        }

        // Intercept console messages (for this page)
        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;

        console.log = function(...args) {
            addLog('info', args.join(' '));
            originalLog.apply(console, args);
        };

        console.warn = function(...args) {
            addLog('warn', args.join(' '));
            originalWarn.apply(console, args);
        };

        console.error = function(...args) {
            addLog('error', args.join(' '));
            originalError.apply(console, args);
        };

        // Check server status
        async function checkServerStatus() {
            try {
                const response = await fetch('http://localhost:8080/viz/');
                if (response.ok) {
                    document.getElementById('serverStatus').textContent = 'Online';
                    document.getElementById('serverStatus').className = 'status-value ok';
                    addLog('success', 'Server is online and responding');
                } else {
                    document.getElementById('serverStatus').textContent = 'Error ' + response.status;
                    document.getElementById('serverStatus').className = 'status-value error';
                    addLog('error', 'Server returned status: ' + response.status);
                }
            } catch (err) {
                document.getElementById('serverStatus').textContent = 'Offline';
                document.getElementById('serverStatus').className = 'status-value error';
                addLog('error', 'Failed to connect to server: ' + err.message);
            }
        }

        // Check required files
        async function checkFiles() {
            const files = [
                'index.html',
                'main.js',
                'data.js',
                'viz.js',
                'vendor/three.min.js',
                'vendor/papaparse.min.js',
                'vendor/3d-force-graph.min.js',
                'harvard_cross_registration_data.csv'
            ];
            
            let loaded = 0;
            for (const file of files) {
                try {
                    const response = await fetch(`http://localhost:8080/viz/${file}`);
                    if (response.ok) {
                        loaded++;
                        addLog('success', `✓ ${file}`);
                    } else {
                        addLog('error', `✗ ${file} (${response.status})`);
                    }
                } catch (err) {
                    addLog('error', `✗ ${file} (${err.message})`);
                }
            }
            
            document.getElementById('filesLoaded').textContent = `${loaded}/${files.length}`;
            document.getElementById('filesLoaded').className = 'status-value ' + (loaded === files.length ? 'ok' : 'error');
        }

        // Check WebGL support
        function checkWebGL() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    document.getElementById('webglSupport').textContent = 'Supported';
                    document.getElementById('webglSupport').className = 'status-value ok';
                    addLog('success', 'WebGL is supported');
                } else {
                    document.getElementById('webglSupport').textContent = 'Not Supported';
                    document.getElementById('webglSupport').className = 'status-value error';
                    addLog('error', 'WebGL is not supported in this browser');
                }
            } catch (err) {
                document.getElementById('webglSupport').textContent = 'Error';
                document.getElementById('webglSupport').className = 'status-value error';
                addLog('error', 'WebGL check failed: ' + err.message);
            }
        }

        // Run checks on load
        window.addEventListener('load', async () => {
            addLog('info', 'Starting automated checks...');
            checkWebGL();
            await checkServerStatus();
            await checkFiles();
            addLog('success', 'All checks completed. See results above.');
        });
    </script>
</body>
</html>
